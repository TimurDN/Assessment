services:
  ui:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: qa-assessment-ui
    ports:
      - "3000:3000"
    environment:
      NODE_ENV: production
      PORT: "3000"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:3000/"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 10s
